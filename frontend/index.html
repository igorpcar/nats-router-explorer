<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NATS-MQTT Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/root.css">
  <link rel="stylesheet" href="./src/styles/topics.css">
</head>

<body>

  <div id="header">
    <div class="header-logo">
      <svg class="app-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h1>NATS-Router Explorer</h1>
    </div>
    <div class="header-actions">
      <div class="site-filter-container">
        <span class="filter-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          Site:
        </span>
        <select id="site-filter" class="form-select">
          <option value="" selected>Todos os Sites</option>
        </select>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="messages"></div>
    <div id="details">
      <div id="topic-details">
        <h3>Tópico Selecionado</h3>
        <div class="topic-badge-container">
          <span id="topic-name" class="topic-badge">Nenhum tópico selecionado</span>
        </div>
      </div>
      <div id="value-details">
        <h3>Detalhes da Mensagem</h3>
        <div id="value-container">
          <div id="message-value"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/script.ts" type="module"></script>
</body>

</html>
